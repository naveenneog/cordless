name: Build CLI (self-contained)

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  id-token: write # for npm publish provenance (publish-npm)

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            exe: agent/dist-sea/cordless.exe
            artifact: cordless-cli-windows-x64.zip
          - os: macos-latest
            exe: agent/dist-sea/cordless
            artifact: cordless-cli-macos-arm64.tar.gz
          - os: ubuntu-latest
            exe: agent/dist-sea/cordless
            artifact: cordless-cli-linux-x64.tar.gz
    runs-on: ${{ matrix.os }}
    # macOS CLI is not yet verified (node-pty spawn differences on the runner); keep it non-blocking.
    continue-on-error: ${{ matrix.os == 'macos-latest' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Build web client (-> agent/public)
        run: |
          npm --prefix client ci
          npm --prefix client run build

      - name: Install agent deps
        run: npm --prefix agent ci

      - name: Agent test harness
        run: npm --prefix agent test

      - name: Build self-contained CLI
        run: npm --prefix agent run sea

      - name: Smoke-test the packaged exe (start -> PTY -> stop)
        run: node agent/build/smoke.mjs ${{ matrix.exe }}

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: Compress-Archive -Path agent/dist-sea/* -DestinationPath ${{ matrix.artifact }} -Force

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: tar -czf ${{ matrix.artifact }} -C agent/dist-sea .

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}
          if-no-files-found: error

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact }}
          fail_on_unmatched_files: false

  # On a tag build, publish the CLI to Chocolatey (re-hashes the just-attached Windows zip). Runs in
  # this same tag-triggered run, so it isn't blocked by the "GITHUB_TOKEN releases don't trigger
  # workflows" rule. Requires the CHOCO_API_KEY repo secret; skipped on non-tag builds.
  publish-choco:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    uses: ./.github/workflows/choco-publish.yml
    with:
      version: ${{ github.ref_name }}
    secrets: inherit

  # On a tag build, publish the cordless-cli package to npm (provenance via OIDC).
  # Requires the NPM_TOKEN repo secret; skipped on non-tag builds.
  publish-npm:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    uses: ./.github/workflows/npm-publish.yml
    secrets: inherit


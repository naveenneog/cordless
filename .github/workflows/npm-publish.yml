name: Publish to npm

# Publishes the `cordless-cli` package to npm (the `cordless` command) using npm
# Trusted Publishing (OIDC) — no token required. The trust relationship is set on
# npmjs.com (cordless-cli -> Settings -> Trusted Publisher) and pinned to this repo
# + this workflow file (npm-publish.yml). Provenance is attached automatically.
# Triggers:
#   - workflow_call: invoked by the CLI build (cli.yml) after a tag build, for hands-free publishing.
#   - workflow_dispatch: run manually.
on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # OIDC for npm trusted publishing + provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Update npm (trusted publishing needs npm >= 11.5.1)
        run: npm install -g npm@latest

      - name: Resolve version + match the tag
        id: ver
        run: |
          PKG=$(node -p "require('./agent/package.json').version")
          REF="${GITHUB_REF_NAME#v}"
          if [ "${GITHUB_REF_TYPE}" = "tag" ] && [ "${REF}" != "${PKG}" ]; then
            echo "tag ${REF} != agent/package.json ${PKG}"; exit 1
          fi
          echo "version=${PKG}" >> "$GITHUB_OUTPUT"
          echo "Publishing cordless ${PKG}"

      - name: Install deps
        run: |
          npm --prefix client ci
          npm --prefix agent ci

      - name: Publish cordless-cli
        working-directory: agent
        run: npm publish

      - name: Done
        run: echo "Published cordless-cli@${{ steps.ver.outputs.version }}."

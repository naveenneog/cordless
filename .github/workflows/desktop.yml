name: Build Desktop App

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            build: npm run dist:win
            glob: "desktop/release/*.exe"
          - os: macos-latest
            build: npm run dist:mac
            glob: |
              desktop/release/*.dmg
              desktop/release/*.zip
          - os: ubuntu-latest
            build: npm run dist:linux
            glob: |
              desktop/release/*.AppImage
              desktop/release/*.deb
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: desktop
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install desktop deps
        run: npm ci

      - name: Unit tests (credential/origin parsing)
        run: npm test

      - name: Build ${{ matrix.os }} package
        run: ${{ matrix.build }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # never let electron-builder auto-publish; the release step below owns uploads
          EP_PRE_RELEASE: "false"

      - uses: actions/upload-artifact@v4
        with:
          name: cordless-desktop-${{ matrix.os }}
          path: |
            ${{ matrix.glob }}
          if-no-files-found: error

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ matrix.glob }}
          fail_on_unmatched_files: false
